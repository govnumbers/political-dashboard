name: Update dashboard data
on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests openpyxl
      - name: Pull data and rebuild site
        id: update
        continue-on-error: true
        run: python run_all.py
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
      - name: Commit refreshed data + site
        run: |
          git config user.name "dashboard-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ site/
          git diff --staged --quiet || git commit -m "Update data $(date -u +%Y-%m-%d)"
          git push
      - name: Fail the run if any connector failed
        if: steps.update.outcome == 'failure'
        run: |
          echo "::error::One or more connectors failed. Site redeployed with last-good data."
          exit 1
